<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xin chào</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    .card {
      text-align: center;
      background: #ffffff;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 3rem;
      color: #2d6a4f;
      margin: 0 0 16px;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Xin chào! 👋</h1>
    <p>Chào mừng bạn đến với trang web của chúng tôi.</p>
  </div>
</body>
</html>
